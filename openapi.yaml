  /v1/admin/payments/{id}:
    get:
      summary: Payment detail (admin)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Payment detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentObject'
  /v1/admin/payments/{id}/refund:
