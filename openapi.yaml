          description: Authentication required
  /v1/me/credits/{type}:
    get:
      summary: Get credit balance by type
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: type
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Credit balance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditBalance'
