        '200':
          description: Billing profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserBillingProfile'
  /v1/admin/users/{user_id}/entitlements:
    get:
      summary: List entitlements for a user
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: user_id
