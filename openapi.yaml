  /v1/me/portal:
    post:
      summary: Create Stripe customer portal session
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Portal session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortalResponse'
        '401':
          description: Authentication required
        '404':
          description: Stripe customer not found
  /v1/admin/subscriptions:
    get:
      summary: Admin subscription listing
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Subscription list
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                    example: list
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AdminSubscription'
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
                  has_more:
                    type: boolean
                  url:
                    type: string
        '403':
