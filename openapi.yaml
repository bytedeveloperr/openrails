  /v1/admin/subscriptions/{id}:
    get:
      summary: Admin subscription detail
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Subscription detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSubscription'
        '403':
          description: Admin role required
  /v1/admin/subscriptions/{id}/extend:
    put:
      summary: Extend subscription
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExtendSubscriptionRequest'
      responses:
        '200':
          description: Extended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
  /v1/admin/subscriptions/{id}/cancel:
    post:
      summary: Cancel subscription (admin)
