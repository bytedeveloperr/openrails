          name: at
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Entitlement list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ServiceEntitlementRecord'
    post:
      summary: Grant entitlement
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GrantEntitlementRequest'
