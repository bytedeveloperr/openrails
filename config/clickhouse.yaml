clickhouse:
  logger:
    level: warning
    log: /var/log/clickhouse-server/clickhouse-server.log
    errorlog: /var/log/clickhouse-server/clickhouse-server.err.log
    size: "1000M"
    count: 10

  http_port: 8123
  tcp_port: 9000

  max_connections: 4096
  keep_alive_timeout: 3
  max_concurrent_queries: 100
  uncompressed_cache_size: 8589934592
  mark_cache_size: 5368709120
  allow_nullable_key: 1

  # Reasonable memory limits that don't hog system resources
  max_server_memory_usage: 5368709120 # 5GB max for ClickHouse
  max_memory_usage: 2147483648 # 2GB per query
  max_memory_usage_for_user: 3221225472 # 3GB per user

  # Heavily throttle background merges during migration to prevent OOM
  background_pool_size: 1 # Only 1 background merge at a time
  background_merges_mutations_concurrency_ratio: 1 # No concurrent merges
  max_bytes_to_merge_at_max_space_in_pool: 67108864 # 64MB max merge size
  max_bytes_to_merge_at_min_space_in_pool: 8388608 # 8MB min merge size
  merge_tree_max_rows_to_use_cache: 1048576 # Smaller cache usage
  merge_tree_max_bytes_to_use_cache: 134217728 # 128MB cache limit

  path: /var/lib/clickhouse/
  tmp_path: /var/lib/clickhouse/tmp/

  user_directories:
    users_xml:
      path: /etc/clickhouse-server/users.xml

  default_profile: default
  default_database: default

  timezone: UTC

  # Cluster config moved to clickhouse-cluster.xml for better compatibility
  # (ClickHouse parses XML more reliably for complex nested structures)

  # Load additional YAML fragments from config.d
  include_from: /etc/clickhouse-server/config.d/*.yaml
