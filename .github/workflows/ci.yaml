name: Validate Code

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Configure private module access
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "GH_TOKEN secret is required for private module access" >&2
            exit 1
          fi
          go env -w GOPRIVATE=github.com/doujins-org/*
          go env -w GONOSUMDB=github.com/doujins-org/*
          git config --global url."https://${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
          go mod download
          git config --global --unset-all url."https://${GH_TOKEN}@github.com/".insteadOf || true
      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
        continue-on-error: true
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./...
