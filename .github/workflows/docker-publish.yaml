name: Build Docker Image

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      arm64_runs_on:
        description: 'JSON value for `runs-on` (e.g. "\"ubuntu-24.04-arm64\"" or ["self-hosted","Linux","ARM64"])'
        required: false
        default: "\"ubuntu-24.04-arm64\""

env:
  IMAGE: docker.io/openrails/openrails

jobs:
  build-x86:
    name: Build x86 image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Require DockerHub secrets
        run: |
          DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USER || 'openrails' }}"
          DOCKERHUB_TOKEN="${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKERHUB_PASSWORD }}"
          if [ -z "$DOCKERHUB_USERNAME" ]; then
            echo "Missing Docker Hub username secret. Set DOCKERHUB_USERNAME (preferred) or DOCKERHUB_USER." >&2
            exit 1
          fi
          if [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "Missing Docker Hub token secret. Set DOCKERHUB_TOKEN (preferred) or DOCKERHUB_PASSWORD." >&2
            exit 1
          fi

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USER || 'openrails' }}
          password: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKERHUB_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare GitHub token secret file
        run: |
          if [ -z "${{ secrets.GH_TOKEN }}" ]; then
            echo "GH_TOKEN secret is required to fetch private Go modules." >&2
            exit 1
          fi
          mkdir -p .secrets
          printf '%s' "${{ secrets.GH_TOKEN }}" > .secrets/gh_token
          chmod 600 .secrets/gh_token

      - name: Determine Docker tags
        id: meta
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${GITHUB_SHA::7}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Using tag: $TAG"

      - name: Build and push x86 image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}-x86
          secret-files: |
            gh_token=${{ github.workspace }}/.secrets/gh_token

      - name: Cleanup secrets
        if: always()
        run: |
          rm -f .secrets/gh_token
          rmdir .secrets 2>/dev/null || true

  build-arm64:
    name: Build arm64 image
    runs-on: ${{ fromJson(github.event.inputs.arm64_runs_on || '"ubuntu-24.04-arm64"') }}
    steps:
      - uses: actions/checkout@v4

      - name: Require DockerHub secrets
        run: |
          DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USER || 'openrails' }}"
          DOCKERHUB_TOKEN="${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKERHUB_PASSWORD }}"
          if [ -z "$DOCKERHUB_USERNAME" ]; then
            echo "Missing Docker Hub username secret. Set DOCKERHUB_USERNAME (preferred) or DOCKERHUB_USER." >&2
            exit 1
          fi
          if [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "Missing Docker Hub token secret. Set DOCKERHUB_TOKEN (preferred) or DOCKERHUB_PASSWORD." >&2
            exit 1
          fi

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USER || 'openrails' }}
          password: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKERHUB_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare GitHub token secret file
        run: |
          if [ -z "${{ secrets.GH_TOKEN }}" ]; then
            echo "GH_TOKEN secret is required to fetch private Go modules." >&2
            exit 1
          fi
          mkdir -p .secrets
          printf '%s' "${{ secrets.GH_TOKEN }}" > .secrets/gh_token
          chmod 600 .secrets/gh_token

      - name: Determine Docker tags
        id: meta
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${GITHUB_SHA::7}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Using tag: $TAG"

      - name: Build and push arm64 image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}-arm64
          secret-files: |
            gh_token=${{ github.workspace }}/.secrets/gh_token

      - name: Cleanup secrets
        if: always()
        run: |
          rm -f .secrets/gh_token
          rmdir .secrets 2>/dev/null || true

  create-manifest:
    name: Create multi-arch manifest
    runs-on: ubuntu-latest
    needs: [build-x86, build-arm64]
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Require DockerHub secrets
        run: |
          DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USER || 'openrails' }}"
          DOCKERHUB_TOKEN="${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKERHUB_PASSWORD }}"
          if [ -z "$DOCKERHUB_USERNAME" ]; then
            echo "Missing Docker Hub username secret. Set DOCKERHUB_USERNAME (preferred) or DOCKERHUB_USER." >&2
            exit 1
          fi
          if [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "Missing Docker Hub token secret. Set DOCKERHUB_TOKEN (preferred) or DOCKERHUB_PASSWORD." >&2
            exit 1
          fi

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USER || 'openrails' }}
          password: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKERHUB_PASSWORD }}

      - name: Determine Docker tags
        id: meta
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${GITHUB_SHA::7}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Using tag: $TAG"

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }} \
            -t ${{ env.IMAGE }}:latest \
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}-x86 \
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}-arm64
