name: Build and Push Docker Image

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  ORG_NAME: doujins
  REPO_NAME: billing

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Verify GH_TOKEN is present
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "GH_TOKEN secret is required to fetch private Go modules." >&2
            exit 1
          fi

      - name: Get short commit hash
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.ORG_NAME }}/${{ env.REPO_NAME }}:${{ steps.vars.outputs.sha_short }}
            ${{ env.ORG_NAME }}/${{ env.REPO_NAME }}:latest
          secrets: |
            id=gh_token,env=GH_TOKEN
