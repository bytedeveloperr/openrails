name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Configure private module access
        run: |
          if [ -z "${GITHUB_TOKEN}" ]; then
            echo "GITHUB_TOKEN secret is required for private modules" >&2
            exit 1
          fi
          go env -w GOPRIVATE=github.com/doujins-org/*
          go env -w GONOSUMDB=github.com/doujins-org/*
          token="${GITHUB_TOKEN}"
          git config --global url."https://${token}@github.com/".insteadOf "https://github.com/"
      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./...
      - name: Cleanup credentials
        if: always()
        run: |
          if [ -n "${GITHUB_TOKEN}" ]; then
            git config --global --unset-all url."https://${GITHUB_TOKEN}@github.com/".insteadOf || true
          fi
