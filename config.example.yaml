# Billing Service Configuration Example
# Copy this to config.yaml and fill in your actual values
# All settings can also be set via environment variables (see .env.example)

# =============================================================================
# CORE SETTINGS
# =============================================================================

# Environment: prod, dev, development, production
# Controls logging verbosity and debug features (NOT payment mode)
env: "development"

# Test Mode: Controls whether payment processors use sandbox/test environments
# - true (default): NMI uses sandbox.nmi.com, CCBill uses sandbox-api, Solana uses devnet
# - false: All processors use production endpoints
#
# This is separate from 'env' - you can run env=prod with test_mode=true for
# staging environments, or env=dev with test_mode=false for local prod testing.
#
# Stripe note: Stripe uses API key prefix (sk_test_* vs sk_live_*) to determine mode.
# If your key doesn't match test_mode, Stripe will be disabled with a warning.
test_mode: true

# =============================================================================
# STANDALONE MODE ONLY
# =============================================================================
# These settings only apply when running Open Rails Billing as a standalone service.
# In embedded mode, the host application handles binding and routing.

host: "0.0.0.0"        # Address to bind to (default: 0.0.0.0)
port: 2053             # Public HTTP/HTTPS port (default: 2053)
private_port: 8060     # Internal/service API port (default: 8060)

# =============================================================================
# DEVELOPER TOOLS (OPTIONAL)
# =============================================================================
# Cloudflared is used for deterministic public webhook URLs when testing Mobius/NMI sandbox.
# Billing does not run `cloudflared`, but these keys document the stable hostname/token
# that your developer tooling uses. Prefer setting `cloudflared.tunnel_token` via env.
#
# See: docs/cloudflared-webhooks.md and .env.example
cloudflared:
  # tunnel_token: ""  # secret; prefer env CLOUDFLARED_TUNNEL_TOKEN
  tunnel_name: "openrails-webhooks"
  public_hostname: "openrails-webhooks.example.com"

# =============================================================================
# BOTH MODES (standalone + embedded)
# =============================================================================
# These settings apply in both standalone and embedded modes.

# API URL: Base URL where billing's /v1/* routes are mounted.
# REQUIRED for Solana Pay transaction_request URLs and webhook generation.
#
# Standalone mode: Routes are at /v1/*, so just the origin:
#   api_url: "https://api.mysite.com"
#   → Generated URL: https://api.mysite.com/v1/checkout/:id/solana-pay
#
# Embedded mode: Routes are at /{mount_prefix}/v1/*, include the mount prefix:
#   api_url: "https://api.mysite.com/billing"
#   → Generated URL: https://api.mysite.com/billing/v1/checkout/:id/solana-pay
#
api_url: "https://api.example.com"

# OpenRails API key for private admin routes (header: X-API-KEY)
# Default is "change-me-in-dev"; override via env OPENRAILS_API_KEY (or API_KEY) for non-dev
api_key: "change-me-in-dev"

# CORS origins for frontend access (REQUIRED for browser requests)
# These are the frontend domains allowed to call billing APIs.
#
# If not set and api_url is set: derives origin from api_url
# If dev mode with nothing set: localhost:3000, localhost:5173, localhost:8080
# If prod with nothing set: blocks all cross-origin requests
cors_origins:
  - "http://localhost:3000"
  - "https://your-frontend-domain.com"

# =============================================================================
# STORE/MERCHANT BRANDING
# =============================================================================
# Used across the system for consistent branding (Solana Pay, emails, receipts)

store:
  name: "My Store"                              # Merchant name (default: "My Store")
  logo_url: "https://your-domain.com/logo.png"  # Logo URL (default: embedded $ icon)
  from_email: "noreply@your-domain.com"         # Sender email for all outgoing emails (required if sendgrid configured)
  customer_portal_url: "https://your-domain.com/account" # Customer portal URL (used in emails)

# =============================================================================
# LOGGING
# =============================================================================

logger:
  level: "info"  # debug, info, warn, error, fatal, panic (default: info)

# =============================================================================
# DATABASE (PostgreSQL)
# =============================================================================
# Provide DB_URL via environment (.env) instead of secrets here

db:
  # Option 1: Full connection string (set via DB_URL env var)
  # url: "postgres://user:pass@host:5432/dbname?sslmode=disable"

  # Option 2: Atomic parameters (preferred for Kubernetes/Vault)
  host: "localhost"
  port: "5432"
  database: "openrails_db"
  username: "admin"
  # password: set via DB_PASSWORD env var
  sslmode: "disable"

# =============================================================================
# REDIS (for caching, sessions, rate limiting)
# =============================================================================

redis:
  addr: "garnet:6379"   # Redis/Garnet address (default: garnet:6379)
  # password: ""        # Set via REDIS_PASSWORD env var if needed
  db: 0                 # Redis database number (default: 0)

# =============================================================================
# IDEMPOTENCY / DEDUPLICATION
# =============================================================================
# Durable SQL dedupe records are cleaned up by a daily maintenance job.
# Keep this long enough to cover webhook replay windows and manual replays.
idempotency:
  webhook_dedupe_retention_days: 90

# =============================================================================
# AUTHENTICATION (JWT Verifier)
# =============================================================================
# Billing is a JWT verifier (not issuer). It verifies tokens from your IdP.

auth:
  # Issuers - array of token issuer URLs
  # Billing fetches public keys from each {issuer}/.well-known/jwks.json per OIDC spec
  issuers:
    - "http://localhost:8080"
    - "http://localhost:8081"
  # Production example:
  # issuers:
  #   - "https://issuer.example.com"

  # Expected audience - the expected "aud" claim in incoming JWTs
  expected_audience: "openrails-app"

# =============================================================================
# PAYMENT PROCESSORS
# =============================================================================
# All processors are configured under a single "processors" map.
# Reserved names (ccbill, stripe, solana) don't need explicit "type" field.
# Non-reserved names (e.g., "mobius", "acme") require "type: nmi".
#
# Environment variables: PROCESSORS_<NAME>_<FIELD>
# Example: PROCESSORS_MOBIUS_SECURITY_KEY, PROCESSORS_CCBILL_CLIENT_ACC_NUM

processors:
  # ---------------------------------------------------------------------------
  # NMI-backed processors (type: nmi)
  # ---------------------------------------------------------------------------
  # Add any NMI/Mobius gateway providers here.
  # Non-reserved names require "type: nmi".
  mobius:
    type: nmi
    # Secrets - set via env: PROCESSORS_MOBIUS_SECURITY_KEY, etc.
    # security_key: ""
    # tokenization_key: ""
    # tokenization_url: "https://secure.networkmerchants.com/token/Collect.js"
    # webhook_secret: ""

    # Provider-specific URLs (optional - defaults to standard NMI)
    # direct_post_url: "https://secure.mobiusgateway.com/api/transact.php"
    # query_url: "https://secure.mobiusgateway.com/api/query.php"

  # Example: Another NMI provider (just add config, no code changes needed)
  # acme:
  #   type: nmi
  #   security_key: ""  # or via PROCESSORS_ACME_SECURITY_KEY

  # ---------------------------------------------------------------------------
  # CCBill (reserved name - type implied)
  # ---------------------------------------------------------------------------
  ccbill:
    client_acc_num: "your-ccbill-account-number"
    client_sub_acc: "your-ccbill-subaccount"
    subscription_type_id: "0001"  # Must match CCBill portal config
    # salt: set via PROCESSORS_CCBILL_SALT env var

    # CCBill retry/dunning behavior is controlled by CCBill itself. OpenRails follows the
    # webhook-provided nextRetryDate schedule and does not offer grace tuning knobs here.

    # DataLink credentials (enables reconciliation worker)
    # datalink_username: set via PROCESSORS_CCBILL_DATALINK_USERNAME env var
    # datalink_password: set via PROCESSORS_CCBILL_DATALINK_PASSWORD env var

  # ---------------------------------------------------------------------------
  # Stripe (reserved name - type implied)
  # ---------------------------------------------------------------------------
  stripe:
    # secret_key: set via PROCESSORS_STRIPE_SECRET_KEY env var
    # webhook_secret: set via PROCESSORS_STRIPE_WEBHOOK_SECRET env var
    success_url: "https://your-domain.com/checkout/success"
    cancel_url: "https://your-domain.com/checkout/cancel"

  # ---------------------------------------------------------------------------
  # Solana (reserved name - type implied)
  # ---------------------------------------------------------------------------
  solana:
    recipient_wallet: "your-solana-wallet-address"
    # network is auto-derived from test_mode: devnet if test_mode=true, mainnet otherwise
    # Explicit network setting overrides auto-derivation (rarely needed)

    # -------------------------------------------------------------------------
    # RPC Configuration (choose one approach)
    # -------------------------------------------------------------------------
    #
    # OPTION 1: Automatic RPC fallback chain (RECOMMENDED)
    # Leave rpc_endpoint empty. Uses: Helius → Ankr → Solana public
    # Add helius_api_key for Helius as primary (100k req/day free tier)
    #
    # helius_api_key: ""  # Get free API key at https://helius.dev
    #
    # OPTION 2: Custom RPC endpoint (bypasses fallback chain)
    # rpc_endpoint: "https://your-rpc-provider.com"

    # -------------------------------------------------------------------------
    # Token Configuration (choose one approach)
    # -------------------------------------------------------------------------
    #
    # OPTION 1: Simple enabled_tokens list (RECOMMENDED)
    # Just list token symbols - metadata fetched from Jupiter at startup
    # Only verified tokens from Jupiter strict list are supported
    #
    enabled_tokens: ["SOL", "USDC", "PYUSD"]
    #
    # Add any Jupiter-verified token:
    # enabled_tokens: ["SOL", "USDC", "PYUSD", "BONK", "JUP", "USDT"]
    #
    # OPTION 2: Legacy supported_tokens map (for custom/unverified tokens)
    # Use this if you need non-Jupiter tokens or custom configuration
    #
    # supported_tokens:
    #   SOL:
    #     mint: ""  # Native SOL has no mint address
    #     symbol: "SOL"
    #     name: "Solana"
    #     decimals: 9
    #     enabled: true
    #   USDC:
    #     mint: "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v"
    #     symbol: "USDC"
    #     name: "USD Coin"
    #     decimals: 6
    #     enabled: true

# =============================================================================
# ANALYTICS (ClickHouse)
# =============================================================================

clickhouse:
  http_addr: "http://clickhouse:8123"
  client_addr: "clickhouse:9000"
  db: "analytics"
  cluster: "billing"  # ClickHouse cluster name
  # user: set via CLICKHOUSE_USER env var
  # password: set via CLICKHOUSE_PASSWORD env var

# =============================================================================
# EMAIL (SendGrid)
# =============================================================================
# Sender info (from_email, from_name) comes from store config above.

sendgrid:
  # api_key: set via SENDGRID_API_KEY env var
  # Sender email uses store.from_email, sender name uses store.name

# =============================================================================
# RATE LIMITING
# =============================================================================
# All rate limits use a fixed 1-minute window.

rate_limits:
  subscribe:
    requests_per_minute: 10  # Very restrictive for payment endpoints
    burst: 3                 # Max burst size (optional)

  checkout:
    requests_per_minute: 5   # Heavy rate limiting for checkout
    burst: 2

  webhook:
    requests_per_minute: 100 # Higher for processor webhooks
    burst: 20

  payment:
    requests_per_minute: 20  # Payment method operations
    burst: 5

  default:
    requests_per_minute: 60  # Default for other endpoints
    burst: 10

# =============================================================================
# FEATURE FLAGS (Safety Controls)
# =============================================================================
# These flags control potentially destructive background operations.
# Use them to quickly disable operations when bugs are suspected,
# without requiring a code deployment.
#
# Environment variables:
#   FEATURE_FLAGS_DUNNING_MODE=on|dry_run_only|off
#   FEATURE_FLAGS_DISABLE_ENTITLEMENT_EXPIRATION=true|false

feature_flags:
  # -------------------------------------------------------------------------
  # Dunning Mode - Controls retry charging for failed subscription rebills
  # -------------------------------------------------------------------------
  # Values:
  #   "on" (default):     Normal dunning - retry charges, grace period, recovery workflow
  #   "dry_run_only":     Workflow runs but no charges attempted
  #                       - Subscriptions stay in past_due state
  #                       - Retry counts preserved (not incremented)
  #                       - Use when debugging charge logic bugs
  #   "off":              No dunning - immediate cancellation on rebill failure
  #                       - No grace period, no retry attempts
  #                       - Use when dunning itself is broken or business decision
  #
  # Example: If charge logic has a bug causing incorrect amounts:
  #   1. Set dunning_mode: dry_run_only
  #   2. Fix the bug, deploy
  #   3. Set dunning_mode: on
  #   4. All accumulated past_due subscriptions will be retried
  #
  dunning_mode: "on"

  # -------------------------------------------------------------------------
  # Disable Entitlement Expiration - Stops credits/entitlements from expiring
  # -------------------------------------------------------------------------
  # When true:
  #   - CreditExpiryWorker skips - expired credit batches are preserved
  #   - HoldExpiryWorker skips - expired holds stay active
  #   - FailMembership skips entitlement revocation (but still cancels subscription)
  #   - Users keep premium access even after subscription ends
  #
  # When false (default):
  #   - Normal expiration behavior
  #
  # Use case: Bug in expiration logic causing premature credit/entitlement loss
  #
  # Example: If credits are expiring too early due to timezone bug:
  #   1. Set disable_entitlement_expiration: true
  #   2. Fix the bug, deploy
  #   3. Set disable_entitlement_expiration: false
  #   4. All accumulated expirations will process at once
  #
  disable_entitlement_expiration: false
