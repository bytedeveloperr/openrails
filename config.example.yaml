# Billing Service Configuration Example
# Copy this to config.yaml and fill in your actual values
# All settings can also be set via environment variables (see .env.example)

# =============================================================================
# CORE SETTINGS
# =============================================================================

# Environment: prod, dev, development, production
env: "development"

# =============================================================================
# STANDALONE MODE ONLY
# =============================================================================
# These settings only apply when running doujins-billing as a standalone service.
# In embedded mode, the host application handles binding and routing.

host: "0.0.0.0"        # Address to bind to (default: 0.0.0.0)
port: 2053             # Public HTTP/HTTPS port (default: 2053)
private_port: 8060     # Internal/service API port (default: 8060)

# =============================================================================
# BOTH MODES (standalone + embedded)
# =============================================================================
# These settings apply in both standalone and embedded modes.

# API URL: Base URL where billing's /v1/* routes are mounted.
# REQUIRED for Solana Pay transaction_request URLs and webhook generation.
#
# Standalone mode: Routes are at /v1/*, so just the origin:
#   api_url: "https://api.mysite.com"
#   → Generated URL: https://api.mysite.com/v1/checkout/:id/solana-pay
#
# Embedded mode: Routes are at /{mount_prefix}/v1/*, include the mount prefix:
#   api_url: "https://api.mysite.com/billing"
#   → Generated URL: https://api.mysite.com/billing/v1/checkout/:id/solana-pay
#
api_url: "https://api.example.com"

# Billing API key for private admin routes (header: X-API-KEY)
# Default is "change-me-in-dev"; override via env BILLING_API_KEY for non-dev
api_key: "change-me-in-dev"

# CORS origins for frontend access (REQUIRED for browser requests)
# These are the frontend domains allowed to call billing APIs.
#
# If not set and api_url is set: derives origin from api_url
# If dev mode with nothing set: localhost:3000, localhost:5173, localhost:8080
# If prod with nothing set: blocks all cross-origin requests
cors_origins:
  - "http://localhost:3000"
  - "https://your-frontend-domain.com"

# =============================================================================
# STORE/MERCHANT BRANDING
# =============================================================================
# Used across the system for consistent branding (Solana Pay, emails, receipts)

store:
  name: "My Store"                              # Merchant name (default: "My Store")
  logo_url: "https://your-domain.com/logo.png"  # Logo URL (default: embedded $ icon)
  from_email: "noreply@your-domain.com"         # Sender email for all outgoing emails (required if sendgrid configured)

# =============================================================================
# LOGGING
# =============================================================================

logger:
  level: "info"  # debug, info, warn, error, fatal, panic (default: info)

# =============================================================================
# DATABASE (PostgreSQL)
# =============================================================================
# Provide DB_URL via environment (.env) instead of secrets here

db:
  # Option 1: Full connection string (set via DB_URL env var)
  # url: "postgres://user:pass@host:5432/dbname?sslmode=disable"

  # Option 2: Atomic parameters (preferred for Kubernetes/Vault)
  host: "localhost"
  port: "5432"
  database: "doujins_db"
  username: "admin"
  # password: set via DB_PASSWORD env var
  sslmode: "disable"

# =============================================================================
# REDIS (for caching, sessions, rate limiting)
# =============================================================================

redis:
  addr: "garnet:6379"   # Redis/Garnet address (default: garnet:6379)
  # password: ""        # Set via REDIS_PASSWORD env var if needed
  db: 0                 # Redis database number (default: 0)

# =============================================================================
# AUTHENTICATION (JWT Verifier)
# =============================================================================
# Billing is a JWT verifier (not issuer). It verifies tokens from doujins/hentai0.

auth:
  # Issuers - array of token issuer URLs
  # Billing fetches public keys from each {issuer}/.well-known/jwks.json per OIDC spec
  issuers:
    - "http://localhost:2052"  # doujins
    - "http://localhost:4000"  # hentai0
  # Production example:
  # issuers:
  #   - "https://doujins.com"
  #   - "https://hentai0.com"

  # Expected audience - the expected "aud" claim in incoming JWTs
  expected_audience: "billing-app"

# =============================================================================
# PAYMENT PROCESSORS
# =============================================================================

# -----------------------------------------------------------------------------
# CCBill
# -----------------------------------------------------------------------------
ccbill:
  client_acc_num: "your-ccbill-account-number"
  client_sub_acc: "your-ccbill-subaccount"
  # salt: set via CCBILL_SALT env var

  subscription_type_id: "0001"  # Must match CCBill portal config
  test_mode: true               # true = sandbox, false = production

  # DataLink credentials (enables reconciliation worker)
  # datalink_username: set via CCBILL_DATALINK_USERNAME env var
  # datalink_password: set via CCBILL_DATALINK_PASSWORD env var

# -----------------------------------------------------------------------------
# NMI (Network Merchants Inc) / Mobius
# -----------------------------------------------------------------------------
nmi:
  test_mode: true  # true = test mode, false = live charges

  # Global settings (can be overridden per-provider)
  # direct_post_url: "https://secure.networkmerchants.com/api/transact.php"
  # query_url: "https://secure.nmi.com/api/query.php"

  providers:
    mobius:
      # Secrets - set via env vars: NMI_PROVIDERS_MOBIUS_SECURITY_KEY, etc.
      # security_key: ""
      # tokenization_key: ""
      # webhook_secret: ""

      # Provider-specific URLs (optional)
      # direct_post_url: "https://secure.mobiusgateway.com/api/transact.php"
      # query_url: "https://secure.mobiusgateway.com/api/query.php"

# -----------------------------------------------------------------------------
# Stripe
# -----------------------------------------------------------------------------
stripe:
  # secret_key: set via STRIPE_SECRET_KEY env var
  # webhook_secret: set via STRIPE_WEBHOOK_SECRET env var
  success_url: "https://your-domain.com/checkout/success"
  cancel_url: "https://your-domain.com/checkout/cancel"

# -----------------------------------------------------------------------------
# Solana
# -----------------------------------------------------------------------------
solana:
  rpc_endpoint: "https://api.mainnet-beta.solana.com"
  network: "mainnet"  # mainnet, devnet, testnet
  recipient_wallet: "your-solana-wallet-address"

  # Transaction settings
  transaction_timeout_seconds: 300  # 5 minutes
  confirmation_blocks: 1
  max_transaction_fee: 0.01  # SOL

  # Supported tokens (defaults provided for each network)
  # Token prices are fetched dynamically from Jupiter at runtime
  supported_tokens:
    SOL:
      mint: ""  # Native SOL has no mint address
      symbol: "SOL"
      name: "Solana"
      decimals: 9
      enabled: true

    USDC:
      mint: "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v"
      symbol: "USDC"
      name: "USD Coin"
      decimals: 6
      enabled: true

    PYUSD:
      mint: "2b1kV6DkPAnxd5ixfnxCpjxmKwqjjaYmCZfHsFu24GXo"
      symbol: "PYUSD"
      name: "PayPal USD"
      decimals: 6
      enabled: true

# =============================================================================
# ANALYTICS (ClickHouse)
# =============================================================================

clickhouse:
  http_addr: "http://clickhouse:8123"
  client_addr: "clickhouse:9000"
  database: "analytics"
  cluster: "doujins"  # ClickHouse cluster name
  # user: set via CLICKHOUSE_USER env var
  # password: set via CLICKHOUSE_PASSWORD env var

# =============================================================================
# EMAIL (SendGrid)
# =============================================================================
# Sender info (from_email, from_name) comes from store config above.

sendgrid:
  # api_key: set via SENDGRID_API_KEY env var
  # Sender email uses store.from_email, sender name uses store.name

# =============================================================================
# RATE LIMITING
# =============================================================================
# All rate limits use a fixed 1-minute window.

rate_limits:
  subscribe:
    requests_per_minute: 10  # Very restrictive for payment endpoints
    burst: 3                 # Max burst size (optional)

  checkout:
    requests_per_minute: 5   # Heavy rate limiting for checkout
    burst: 2

  webhook:
    requests_per_minute: 100 # Higher for processor webhooks
    burst: 20

  payment:
    requests_per_minute: 20  # Payment method operations
    burst: 5

  default:
    requests_per_minute: 60  # Default for other endpoints
    burst: 10
