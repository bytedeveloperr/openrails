# Billing Service Configuration Example
# Copy this to config.yaml and fill in your actual values

# Environment: prod, dev, development, production
env: "development"

# Server configuration
# host: "0.0.0.0"  # Host to bind to (default: 0.0.0.0)
# port: 2053       # Public HTTP/HTTPS port (default: 2053)

# CORS origins for frontend access
cors_origins:
  - "http://localhost:3000"
  - "https://your-frontend-domain.com"

# Database configuration (non-secrets only)
# Provide DB_URL via environment (.env) instead of here
db:
  dialect: "postgres"

# Redis configuration for caching and sessions (non-secrets only)
# Provide REDIS_URL via environment (.env) instead of password here
redis:
  # Matches docker-compose Garnet (service name: garnet)
  host: "garnet:6379"
  # db: 0

# Auth/JWT configuration for authentication (Verifier Only)
# Billing acts as a JWT verifier, not an issuer. It verifies tokens from doujins/hentai0.
auth:
  # Issuers - array of token issuer URLs
  # Billing will fetch public keys from each {issuer}/.well-known/jwks.json per OIDC spec
  issuers:
    - "http://localhost:2052"  # doujins
    - "http://localhost:4000"  # hentai0
  # Production example:
  # issuers:
  #   - "https://doujins.com"
  #   - "https://hentai0.com"

  # Expected audience - the expected "aud" claim in incoming JWTs (must be "billing-app")
  expected_audience: "billing-app"

# Billing API key for private admin routes (header: X-API-KEY)
# Default is "change-me-in-dev"; override via env BILLING_API_KEY for non-dev.
billing_api_key: "change-me-in-dev"

# CCBill payment processor configuration
ccbill:
  # Required CCBill identifiers
  client_acc_num: "your-ccbill-account-number"
  client_sub_acc: "your-ccbill-subaccount"
  # salt: set via env CCBILL_SALT

  # Form configuration (must match CCBill portal)
  subscription_type_id: "0001"

  # Toggle sandbox vs production FlexForm hosts
  test_mode: true

  # DataLink credentials (enable reconcile worker when provided)
  # datalink_username: set via env CCBILL_DATALINK_USERNAME
  # datalink_password: set via env CCBILL_DATALINK_PASSWORD

# NMI payment processor configuration
nmi:
  test_mode: true
  # direct_post_url: "https://secure.networkmerchants.com/api/transact.php" # optional global override
  # query_url: "https://secure.nmi.com/api/query.php"                       # optional global override

  providers:
    mobius:
      # Supply secrets via env or override here
      security_key: ""
      tokenization_key: ""
      webhook_secret: ""
      # direct_post_url: "https://secure.mobiusgateway.com/api/transact.php"
      # query_url: "https://secure.mobiusgateway.com/api/query.php"

# Webhook processing configuration
webhooks:
  retry:
    max_attempts: 5
    initial_backoff: 1m
    max_backoff: 1h
    batch_size: 100

# Solana blockchain configuration
solana:
  rpc_endpoint: "https://api.mainnet-beta.solana.com"
  network: "mainnet" # mainnet, devnet, testnet
  recipient_wallet: "your-solana-wallet-address"
  destination_wallet: "your-solana-wallet-address" # alias for recipient_wallet
  
  # Transaction settings
  transaction_timeout_seconds: 300 # 5 minutes
  confirmation_blocks: 1
  max_transaction_fee: 0.01 # SOL
  
  # Supported tokens
  # Note: Token prices are fetched dynamically from Jupiter at runtime
  supported_tokens:
    SOL:
      mint: "" # Native SOL doesn't have a mint address
      symbol: "SOL"
      name: "Solana"
      decimals: 9
      enabled: true

    USDC:
      mint: "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v"
      symbol: "USDC"
      name: "USD Coin"
      decimals: 6
      enabled: true

    PYUSD:
      mint: "2b1kV6DkPAnxd5ixfnxCpjxmKwqjjaYmCZfHsFu24GXo"
      symbol: "PYUSD"
      name: "PayPal USD"
      decimals: 6
      enabled: true

# ClickHouse analytics database
clickhouse:
  # Matches docker-compose ClickHouse (service name: clickhouse)
  http_addr: "http://clickhouse:8123"
  client_addr: "clickhouse:9000"
  database: "analytics"
  # Provide CLICKHOUSE_USER and CLICKHOUSE_PASSWORD via env

# SendGrid email service configuration
sendgrid:
  from_email: "noreply@your-domain.com"
  from_name: "Doujins Billing"
  # Provide SENDGRID_API_KEY via env

# Rate limiting configuration
rate_limits:
  # Subscription endpoints (very restrictive)
  subscribe_limit:
    requests_per_minute: 10
    burst_size: 3
  
  # Webhook endpoints (higher limit)
  webhook_limit:
    requests_per_minute: 100
    burst_size: 20
  
  # Payment method operations
  payment_limit:
    requests_per_minute: 20
    burst_size: 5
  
  # Default for other endpoints
  default_limit:
    requests_per_minute: 60
    burst_size: 10
