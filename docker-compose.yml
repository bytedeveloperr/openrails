version: '3.8'

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: billing
      POSTGRES_USER: billing
      POSTGRES_PASSWORD: billing123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U billing -d billing"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis cache
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Billing service
  billing:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database configuration
      DATABASE_URL: postgres://billing:billing123@postgres:5432/billing?sslmode=disable
      
      # Redis configuration  
      REDIS_URL: redis://redis:6379/0
      
      # Service configuration
      ENV: development
      PUBLIC_PORT: 2052
      PRIVATE_PORT: 8060
      HOST: 0.0.0.0
      
      # Logging
      LOG_LEVEL: info
      
      # JWT Configuration
      JWT_SECRET: "dev-jwt-secret-change-in-production"
      JWT_ISSUER: "doujins-billing"
      
      # Payment processor configs (optional for development)
      # CCBILL_CLIENT_ACCOUNT: "your-ccbill-account"
      # CCBILL_CLIENT_SUBACCOUNT: "your-ccbill-subaccount"
      # CCBILL_FORM_ID: "your-flexform-id"
      # CCBILL_SALT: "your-ccbill-salt"
      # MOBIUS_SECURITY_KEY: "your-mobius-key"
      # MOBIUS_TOKENIZATION_KEY: "your-mobius-tokenization-key"
      # MOBIUS_WEBHOOK_SECRET: "your-mobius-webhook-secret"
      # SENDGRID_API_KEY: "your-sendgrid-key"
      # SENDGRID_FROM_EMAIL: "noreply@your-domain.com"
    ports:
      - "2052:2052"  # Public API (frontend and webhooks)
      - "8060:8060"  # Private API (internal communication)
    volumes:
      # Mount config if using file-based configuration
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2052/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Billing workers (background jobs)
  billing-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Same environment as billing service
      DATABASE_URL: postgres://billing:billing123@postgres:5432/billing?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      ENV: development
      LOG_LEVEL: info
      
      # JWT Configuration
      JWT_SECRET: "dev-jwt-secret-change-in-production"
      JWT_ISSUER: "doujins-billing"
    command: ["./billing", "worker"]
    volumes:
      - ./config:/app/config:ro

volumes:
  postgres_data:
  redis_data: