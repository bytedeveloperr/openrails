services:
  postgres:
    image: postgres:17-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: billing_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Bootstrap SQL runs automatically during first initialization
      - ./migrations/bootstrap/001_postgres_init.sql:/docker-entrypoint-initdb.d/001_postgres_init.sql:ro
    command:
      - postgres
      - -c
      - listen_addresses=*
      - -c
      - log_min_messages=warning
      - -c
      - client_min_messages=warning
      - -c
      - log_error_verbosity=terse
      - -c
      - log_connections=off
      - -c
      - log_disconnections=off
      - -c
      - log_statement=none
      - -c
      - log_min_error_statement=error
      - -c
      - log_min_duration_statement=-1
    networks:
      - local-billing
    healthcheck:
      # Verify bootstrap completed by checking the billing schema exists.
      test: ["CMD-SHELL", "pg_isready -U admin -d billing_db -h localhost && psql -U admin -d billing_db -tAc \"SELECT 1 FROM pg_namespace WHERE nspname='billing'\" | grep -q 1"]
      interval: 5s
      timeout: 5s
      start_period: 90s
      retries: 5
  
  garnet:
    image: ghcr.io/microsoft/garnet:latest
    volumes:
      - garnet_data:/data
    ports:
      - "6382:6379"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "timeout 1 bash -c 'exec 3<>/dev/tcp/localhost/6379' 2>/dev/null",
        ]
      interval: 2s
      timeout: 5s
      retries: 5
    networks:
      - local-billing

  # ClickHouse Keeper for coordination (enables ON CLUSTER DDL)
  clickhouse-keeper:
    image: clickhouse/clickhouse-keeper:25.8-alpine
    restart: unless-stopped
    volumes:
      - ./config/clickhouse-keeper.xml:/etc/clickhouse-keeper/keeper_config.xml:ro
      - clickhouse_keeper_data:/var/lib/clickhouse
    ports:
      - "9181:9181" # Keeper port
    networks:
      - local-billing
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "9181"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ClickHouse for analytics
  clickhouse:
    image: clickhouse/clickhouse-server:25.8-alpine
    restart: unless-stopped
    depends_on:
      clickhouse-keeper:
        condition: service_healthy
    ports:
      - "8123:8123"  # HTTP interface
      - "9002:9000"  # Native client (avoiding conflict with MinIO)
    volumes:
      # Mount configs as config.d fragments so they merge with default config.xml
      - ./config/clickhouse.yaml:/etc/clickhouse-server/config.d/local.yaml:ro
      - ./config/clickhouse-cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    environment:
      # No user/db creation via entrypoint - bootstrap script handles everything
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - local-billing

  # Bootstrap DB: create roles/schema/extensions using superuser
  # One-shot job: Bootstrap ClickHouse cluster (create user, database, permissions)
  clickhouse-bootstrap:
    image: clickhouse/clickhouse-server:25.8-alpine
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh"]
    command:
      - "-c"
      - |
        # Wait a bit extra for cluster coordination to be fully ready
        sleep 5

        # Run bootstrap SQL as default admin user (has all privileges)
        cat <<'SQL_EOF' | sed 's/{CLICKHOUSE_USER}/analytics_user/g' | sed 's/{CLICKHOUSE_PASSWORD}/analytics_password/g' | clickhouse-client --host clickhouse --multiquery
        -- Create database across cluster
        CREATE DATABASE IF NOT EXISTS analytics ON CLUSTER billing;

        -- Create ClickHouse user with password
        CREATE USER IF NOT EXISTS {CLICKHOUSE_USER} ON CLUSTER billing
          IDENTIFIED WITH plaintext_password BY '{CLICKHOUSE_PASSWORD}'
          HOST ANY;

        -- Grant full database access WITH GRANT OPTION so user can run migrations
        GRANT ON CLUSTER billing ALL ON analytics.* TO {CLICKHOUSE_USER} WITH GRANT OPTION;

        -- Grant CLUSTER privilege required for ON CLUSTER DDL statements
        GRANT ON CLUSTER billing CLUSTER ON *.* TO {CLICKHOUSE_USER};

        -- Grant system table permissions for monitoring and debugging
        GRANT ON CLUSTER billing SELECT ON system.tables TO {CLICKHOUSE_USER};
        GRANT ON CLUSTER billing SELECT ON system.columns TO {CLICKHOUSE_USER};
        GRANT ON CLUSTER billing SELECT ON system.databases TO {CLICKHOUSE_USER};
        GRANT ON CLUSTER billing SELECT ON system.parts TO {CLICKHOUSE_USER};
        GRANT ON CLUSTER billing SELECT ON system.parts_columns TO {CLICKHOUSE_USER};
        GRANT ON CLUSTER billing SELECT ON system.mutations TO {CLICKHOUSE_USER};
        GRANT ON CLUSTER billing SELECT ON system.merges TO {CLICKHOUSE_USER};
        GRANT ON CLUSTER billing SELECT ON system.processes TO {CLICKHOUSE_USER};
        SQL_EOF

        echo "✓ ClickHouse bootstrap completed successfully"
    networks:
      - local-billing

  # App migrations: run embedded migrator in the billing image
  # Uses host.docker.internal so migrations run against the same DB as local development
  billing-migrate:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse-bootstrap:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Database connection via host-exposed ports (same as local dev)
      DB_URL: "postgres://admin:${POSTGRES_PASSWORD:-admin_password}@host.docker.internal:5432/billing_db?sslmode=disable"
      # ClickHouse connection via host-exposed ports
      CLICKHOUSE_HTTP_ADDR: "http://host.docker.internal:8123"
      CLICKHOUSE_CLIENT_ADDR: "host.docker.internal:9002"
      CLICKHOUSE_DB: "analytics"
      CLICKHOUSE_USER: "${CLICKHOUSE_USER:-analytics_user}"
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD:-analytics_password}"
    command: ["migrate", "up"]
    restart: "no"
    networks:
      - local-billing

  # Billing service (HTTP server only)
  billing:
    profiles: ["all", "billing"]
    build:
      context: .
      dockerfile: Dockerfile
    # Avoid infinite restart loops if the app panics at startup
    restart: on-failure:3
    depends_on:
      postgres:
        condition: service_healthy
      billing-migrate:
        condition: service_completed_successfully
      garnet:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    ports:
      - "2053:2053"  # API (public endpoints + admin endpoints with JWT auth)
    # Note: Port 8060 (private service API with X-API-Key auth) is exposed internally
    # via Docker network only - not mapped to host. Other containers in local-billing
    # network can reach it at billing:8060 for server-to-server calls.
    expose:
      - "8060"  # Private/service API (X-API-KEY auth, internal only)
    environment:
      # Service runtime mode
      ENV: "${ENV:-development}"
      TEST_MODE: "${TEST_MODE:-true}"
      API_URL: "${API_URL:-http://localhost:2053}"
      AUTH_ISSUERS: '${AUTH_ISSUERS:-["http://localhost:8080"]}'
      AUTH_EXPECTED_AUDIENCE: "${AUTH_EXPECTED_AUDIENCE:-billing-app}"

      # Processor env passthrough (for local sandbox/E2E)
      PROCESSORS_MOBIUS_SECURITY_KEY: "${PROCESSORS_MOBIUS_SECURITY_KEY:-}"
      PROCESSORS_MOBIUS_WEBHOOK_SECRET: "${PROCESSORS_MOBIUS_WEBHOOK_SECRET:-}"
      PROCESSORS_MOBIUS_DIRECT_POST_URL: "${PROCESSORS_MOBIUS_DIRECT_POST_URL:-}"
      PROCESSORS_MOBIUS_QUERY_URL: "${PROCESSORS_MOBIUS_QUERY_URL:-}"
      PROCESSORS_MOBIUS_TOKENIZATION_KEY: "${PROCESSORS_MOBIUS_TOKENIZATION_KEY:-}"
      PROCESSORS_MOBIUS_TOKENIZATION_URL: "${PROCESSORS_MOBIUS_TOKENIZATION_URL:-}"

      # Database connection (admin superuser)
      DB_URL: "postgres://admin:${POSTGRES_PASSWORD:-admin_password}@postgres:5432/billing_db?sslmode=disable"
      # Redis connection
      REDIS_ADDR: "garnet:6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      # ClickHouse connection for analytics
      CLICKHOUSE_HTTP_ADDR: "http://clickhouse:8123"
      CLICKHOUSE_CLIENT_ADDR: "clickhouse:9000"
      CLICKHOUSE_DB: "analytics"
      CLICKHOUSE_USER: "${CLICKHOUSE_USER:-analytics_user}"
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD:-analytics_password}"
      # Private service API key for server-to-server calls (X-API-KEY header)
      BILLING_API_KEY: "${BILLING_API_KEY:-dev-service-api-key-change-me}"
    command: ["server", "--start-workers"]
    volumes:
      - billing_spool:/var/lib/doujins-billing/spool

  # ---------------------------------------------------------------------------
  # E2E SANDBOX: Local AuthKit issuer for minting JWTs (optional)
  # ---------------------------------------------------------------------------
  # This is used for end-to-end sandbox testing where billing needs a real issuer
  # that serves JWKS and can mint JWTs on demand.
  #
  # Start with:
  #   docker compose -f docker-compose.yaml --profile all --profile e2e-sandbox up -d
  #
  # Then mint tokens:
  #   curl -fsS http://localhost:8080/auth/dev/mint ...
  issuer-postgres:
    profiles: ["e2e-sandbox"]
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: authkit_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
    volumes:
      - issuer_postgres_data:/var/lib/postgresql/data
    networks:
      - local-billing
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d authkit_db"]
      interval: 5s
      timeout: 3s
      retries: 20

  issuer:
    profiles: ["e2e-sandbox"]
    build:
      context: ../authkit
      dockerfile: Dockerfile.devserver
    depends_on:
      issuer-postgres:
        condition: service_healthy
    environment:
      ENV: dev
      AUTHKIT_LISTEN_ADDR: ":8080"
      AUTHKIT_ISSUER: "http://issuer:8080"
      AUTHKIT_ISSUED_AUDIENCES: "billing-app"
      AUTHKIT_EXPECTED_AUDIENCES: "billing-app"
      DB_URL: "postgres://admin:admin_password@issuer-postgres:5432/authkit_db?sslmode=disable"
      AUTHKIT_DEV_MODE: "true"
      AUTHKIT_DEV_MINT_SECRET: "${AUTHKIT_DEV_MINT_SECRET:-change-me}"
    ports:
      - "8080:8080"
    volumes:
      - issuer_runtime_keys:/.runtime/authkit
    networks:
      - local-billing

volumes:
  postgres_data:
  garnet_data:
  go_mod_cache:
    external: true
    name: go_mod_cache_persistent
  clickhouse_data:
  clickhouse_logs:
  clickhouse_keeper_data:
  billing_spool:
  issuer_postgres_data:
  issuer_runtime_keys:

networks:
  local-billing:
    name: local-billing
