services:
  postgres:
    image: postgres:17-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: doujins_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Install pgvector at container startup (dev-only) then launch postgres.
    # This avoids a custom Dockerfile.
    user: root
    command:
      - bash
      - -lc
      - |
        set -euo pipefail
        if [ ! -f /usr/lib/postgresql/17/lib/vector.so ]; then
          apt-get update
          apt-get install -y --no-install-recommends postgresql-17-pgvector
          rm -rf /var/lib/apt/lists/*
        fi
        export PATH="/usr/lib/postgresql/17/bin:$PATH"
        exec /usr/local/bin/docker-entrypoint.sh postgres \
          -c listen_addresses='*' \
          -c log_min_messages=warning \
          -c client_min_messages=warning \
          -c log_error_verbosity=terse \
          -c log_connections=off \
          -c log_disconnections=off \
          -c log_statement=none \
          -c log_min_error_statement=error \
          -c log_min_duration_statement=-1
    networks:
      - local-doujins
    healthcheck:
      # Wait until the main DB (app) is reachable on the TCP port.
      test:
        [
          "CMD",
          "pg_isready",
          "-U",
          "admin",
          "-d",
          "doujins_db",
          "-h",
          "localhost",
        ]
      interval: 5s
      timeout: 5s
      start_period: 90s
      retries: 1
  
  garnet:
    image: ghcr.io/microsoft/garnet:latest
    volumes:
      - garnet_data:/data
    ports:
      - "6382:6379"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "timeout 1 bash -c 'exec 3<>/dev/tcp/localhost/6379' 2>/dev/null",
        ]
      interval: 2s
      timeout: 5s
      retries: 5
    networks:
      - local-doujins

  # ClickHouse Keeper for coordination (enables ON CLUSTER DDL)
  clickhouse-keeper:
    image: clickhouse/clickhouse-keeper:25.8-alpine
    restart: unless-stopped
    volumes:
      - ./config/clickhouse-keeper.xml:/etc/clickhouse-keeper/keeper_config.xml:ro
      - clickhouse_keeper_data:/var/lib/clickhouse
    ports:
      - "9181:9181" # Keeper port
    networks:
      - local-doujins
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "9181"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ClickHouse for analytics
  clickhouse:
    image: clickhouse/clickhouse-server:25.8-alpine
    restart: unless-stopped
    depends_on:
      clickhouse-keeper:
        condition: service_healthy
    ports:
      - "8123:8123"  # HTTP interface
      - "9002:9000"  # Native client (avoiding conflict with MinIO)
    volumes:
      # Mount configs as config.d fragments so they merge with default config.xml
      - ./config/clickhouse.yaml:/etc/clickhouse-server/config.d/local.yaml:ro
      - ./config/clickhouse-cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    environment:
      # No user/db creation via entrypoint - bootstrap script handles everything
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - local-doujins

  # Bootstrap DB: create roles/schema/extensions using superuser
  db-bootstrap:
    image: postgres:17-bookworm
    environment:
      PGPASSWORD: admin_password
    volumes:
      - ./migrations/bootstrap:/bootstrap:ro
    # Supply psql variables used by the SQL file
    command: [
      "psql",
      "-v", "ON_ERROR_STOP=1",
      "-h", "postgres",
      "-U", "admin",
      "-d", "doujins_db",
      "-f", "/bootstrap/001_postgres_init.sql"
    ]
    restart: "no"
    networks:
      - local-doujins
    depends_on:
      postgres:
        condition: service_healthy


  # One-shot job: Bootstrap ClickHouse cluster (create user, database, permissions)
  clickhouse-bootstrap:
    image: clickhouse/clickhouse-server:25.8-alpine
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh"]
    command:
      - "-c"
      - |
        # Wait a bit extra for cluster coordination to be fully ready
        sleep 5

        # Run bootstrap SQL as default admin user (has all privileges)
        cat <<'SQL_EOF' | sed 's/{CLICKHOUSE_USER}/analytics_user/g' | sed 's/{CLICKHOUSE_PASSWORD}/analytics_password/g' | clickhouse-client --host clickhouse --multiquery
        -- Create database across cluster
        CREATE DATABASE IF NOT EXISTS analytics ON CLUSTER doujins;

        -- Create ClickHouse user with password
        CREATE USER IF NOT EXISTS {CLICKHOUSE_USER} ON CLUSTER doujins
          IDENTIFIED WITH plaintext_password BY '{CLICKHOUSE_PASSWORD}'
          HOST ANY;

        -- Grant full database access WITH GRANT OPTION so user can run migrations
        GRANT ON CLUSTER doujins ALL ON analytics.* TO {CLICKHOUSE_USER} WITH GRANT OPTION;

        -- Grant CLUSTER privilege required for ON CLUSTER DDL statements
        GRANT ON CLUSTER doujins CLUSTER ON *.* TO {CLICKHOUSE_USER};

        -- Grant system table permissions for monitoring and debugging
        GRANT ON CLUSTER doujins SELECT ON system.tables TO {CLICKHOUSE_USER};
        GRANT ON CLUSTER doujins SELECT ON system.columns TO {CLICKHOUSE_USER};
        GRANT ON CLUSTER doujins SELECT ON system.databases TO {CLICKHOUSE_USER};
        GRANT ON CLUSTER doujins SELECT ON system.parts TO {CLICKHOUSE_USER};
        GRANT ON CLUSTER doujins SELECT ON system.parts_columns TO {CLICKHOUSE_USER};
        GRANT ON CLUSTER doujins SELECT ON system.mutations TO {CLICKHOUSE_USER};
        GRANT ON CLUSTER doujins SELECT ON system.merges TO {CLICKHOUSE_USER};
        GRANT ON CLUSTER doujins SELECT ON system.processes TO {CLICKHOUSE_USER};
        SQL_EOF

        echo "✓ ClickHouse bootstrap completed successfully"
    networks:
      - local-doujins

  # App migrations: run embedded migrator in the billing image
  # Uses host.docker.internal so migrations run against the same DB as local development
  billing-migrate:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      db-bootstrap:
        condition: service_completed_successfully
      clickhouse-bootstrap:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Database connection via host-exposed ports (same as local dev)
      DB_URL: "postgres://admin:${POSTGRES_PASSWORD:-admin_password}@host.docker.internal:5432/doujins_db?sslmode=disable"
      # ClickHouse connection via host-exposed ports
      CLICKHOUSE_HTTP_ADDR: "http://host.docker.internal:8123"
      CLICKHOUSE_CLIENT_ADDR: "host.docker.internal:9002"
      CLICKHOUSE_DB: "analytics"
      CLICKHOUSE_USER: "${CLICKHOUSE_USER:-analytics_user}"
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD:-analytics_password}"
    command: ["migrate", "up"]
    restart: "no"
    networks:
      - local-doujins

  # Billing service (HTTP server only)
  billing:
    profiles: ["all", "billing"]
    build:
      context: .
      dockerfile: Dockerfile
    # Avoid infinite restart loops if the app panics at startup
    restart: on-failure:3
    depends_on:
      postgres:
        condition: service_healthy
      db-bootstrap:
        condition: service_completed_successfully
      billing-migrate:
        condition: service_completed_successfully
      garnet:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    ports:
      - "2053:2053"  # API (public endpoints + admin endpoints with JWT auth)
    # Note: Port 8060 (private service API with X-API-Key auth) is exposed internally
    # via Docker network only - not mapped to host. Other containers in local-doujins
    # network can reach it at billing:8060 for server-to-server calls.
    expose:
      - "8060"  # Private/service API (X-API-KEY auth, internal only)
    environment:
      # Database connection (admin superuser)
      DB_URL: "postgres://admin:${POSTGRES_PASSWORD:-admin_password}@postgres:5432/doujins_db?sslmode=disable"
      # Redis connection
      REDIS_ADDR: "garnet:6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      # ClickHouse connection for analytics
      CLICKHOUSE_HTTP_ADDR: "http://clickhouse:8123"
      CLICKHOUSE_CLIENT_ADDR: "clickhouse:9000"
      CLICKHOUSE_DB: "analytics"
      CLICKHOUSE_USER: "${CLICKHOUSE_USER:-analytics_user}"
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD:-analytics_password}"
      # Private service API key for server-to-server calls (X-API-KEY header)
      API_KEY: "${BILLING_API_KEY:-dev-service-api-key-change-me}"
    command: ["server", "--start-workers"]

  # Billing workers (River + other background loops)
  billing-worker:
    profiles: ["all", "billing"]
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      db-bootstrap:
        condition: service_completed_successfully
      billing-migrate:
        condition: service_completed_successfully
      garnet:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      DB_URL: "postgres://admin:${POSTGRES_PASSWORD:-admin_password}@postgres:5432/doujins_db?sslmode=disable"
      REDIS_ADDR: "garnet:6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      CLICKHOUSE_HTTP_ADDR: "http://clickhouse:8123"
      CLICKHOUSE_CLIENT_ADDR: "clickhouse:9000"
      CLICKHOUSE_DB: "analytics"
      CLICKHOUSE_USER: "${CLICKHOUSE_USER:-analytics_user}"
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD:-analytics_password}"
      API_KEY: "${BILLING_API_KEY:-dev-service-api-key-change-me}"
    command: ["worker"]
    networks:
      - local-doujins
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2053/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - billing_spool:/var/lib/doujins-billing/spool
    networks:
      - local-doujins

volumes:
  postgres_data:
  garnet_data:
  go_mod_cache:
    external: true
    name: go_mod_cache_persistent
  clickhouse_data:
  clickhouse_logs:
  clickhouse_keeper_data:
  billing_spool:

networks:
  local-doujins:
    name: local-doujins
