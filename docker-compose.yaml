services:
  # PostgreSQL database
  postgres:
    # Postgres with pgvector extension preinstalled
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: doujins_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      # App schema for bootstrap script and app defaults
      DB_SCHEMA: ${DB_SCHEMA:-billing}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Ensure Postgres listens on container network interface
    command:
      - postgres
      - -c
      - listen_addresses=*
      - -c
      - log_min_messages=warning
      - -c
      - client_min_messages=warning
      - -c
      - log_statement=none
      - -c
      - log_min_duration_statement=-1
    networks:
      - local-doujins
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "admin", "-d", "doujins_db", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      start_period: 90s
      retries: 10

  # Redis-compatible cache (Microsoft Garnet)
  garnet:
    image: ghcr.io/microsoft/garnet:latest
    volumes:
      - garnet_data:/data
    ports:
      - "6381:6379"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "timeout 1 bash -c 'exec 3<>/dev/tcp/localhost/6379' 2>/dev/null",
        ]
      interval: 2s
      timeout: 5s
      retries: 5
    networks:
      - local-doujins

  # ClickHouse for analytics
  clickhouse:
    image: clickhouse/clickhouse-server:25.8-alpine
    restart: unless-stopped
    ports:
      - "8123:8123"  # HTTP interface
      - "9002:9000"  # Native client (avoid MinIO conflict)
    volumes:
      - ./clickhouse/config.yaml:/etc/clickhouse-server/config.yaml:ro
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    environment:
      CLICKHOUSE_DB: analytics
      CLICKHOUSE_USER: analytics_user
      CLICKHOUSE_PASSWORD: analytics_password
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test: ["CMD", "clickhouse-client", "--user=analytics_user", "--password=analytics_password", "--query", "SELECT 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 120s
    networks:
      - local-doujins

  # One-shot migrator for ClickHouse. Applies all SQL in migrations/clickhouse
  clickhouse-init:
    # Use the server image; it includes `clickhouse-client`
    image: clickhouse/clickhouse-server:25.8-alpine
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "9000"
      CLICKHOUSE_USER: analytics_user
      CLICKHOUSE_PASSWORD: analytics_password
    volumes:
      - ./migrations/clickhouse:/migrations:ro
    # Apply each .sql file once ClickHouse is healthy
    command: >
      sh -lc 'for f in /migrations/*.sql; do [ -e "$${f}" ] || continue; echo "Applying $${f}"; clickhouse-client --host=$$CLICKHOUSE_HOST --port=$$CLICKHOUSE_PORT --user=$$CLICKHOUSE_USER --password=$$CLICKHOUSE_PASSWORD --database analytics --multiquery --queries-file "$${f}" || exit 1; done && echo "ClickHouse migrations complete"'
    restart: "no"
    networks:
      - local-doujins

  # Bootstrap DB: create roles/schema/extensions using superuser
  db-bootstrap:
    image: postgres:17-bookworm
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: admin_password
    volumes:
      - ./migrations/bootstrap:/bootstrap:ro
    # Supply psql variables used by the SQL file
    command: [
      "psql",
      "-v", "ON_ERROR_STOP=1",
      "-v", "APP_PW=${DOUJINS_APP_PW:-doujins_pw}",
      "-v", "BILLING_PW=${BILLING_APP_PW:-billing_password}",
      "-v", "CASDOOR_PW=${CASDOOR_APP_PW:-casdoor_pw}",
      "-h", "postgres",
      "-U", "admin",
      "-d", "doujins_db",
      "-f", "/bootstrap/00000_baseline_roles.sql"
    ]
    restart: "no"
    networks:
      - local-doujins


  # App migrations: run embedded migrator in the billing image
  billing-migrate:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      db-bootstrap:
        condition: service_completed_successfully
    environment:
      # Use the service role created by bootstrap; override BILLING_APP_PW or DATABASE_URL as needed
      DATABASE_URL: ${DATABASE_URL:-postgres://billing_app:${BILLING_APP_PW:-billing_password}@postgres:5432/doujins_db?sslmode=disable}
      DB_SCHEMA: ${DB_SCHEMA:-billing}
    command: ["./bin/billing", "migrate"]
    restart: "no"
    networks:
      - local-doujins

  # Billing service (server + in-process workers)
  billing:
    build:
      context: .
      dockerfile: Dockerfile
    # Avoid infinite restart loops if the app panics at startup
    restart: on-failure:3
    depends_on:
      postgres:
        condition: service_healthy
      db-bootstrap:
        condition: service_completed_successfully
      billing-migrate:
        condition: service_completed_successfully
      garnet:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    ports:
      - "2053:2053"  # Public API
    expose:
      - "8060"       # Private API (internal-only)
    environment:
      # App schema used by the billing service's DB access
      DB_SCHEMA: ${DB_SCHEMA:-billing}
      # Explicit DB URL so runtime never uses stale built-in defaults
      DATABASE_URL: ${DATABASE_URL:-postgres://billing_app:${BILLING_APP_PW:-billing_password}@postgres:5432/doujins_db?sslmode=disable}
      # Prefer configuring search_path via your app's DB URL; PGOPTIONS is a safe default
      PGOPTIONS: -c search_path=$${DB_SCHEMA:-billing},public
      # Example internal API key; override in .env or environment
      # BILLING_INTERNAL_API_KEY: "change-me"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2053/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - billing_spool:/var/lib/doujins-billing/spool
    networks:
      - local-doujins

volumes:
  postgres_data:
  garnet_data:
  clickhouse_data:
  clickhouse_logs:
  billing_spool:

networks:
  local-doujins:
    driver: bridge
