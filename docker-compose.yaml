services:
  postgres:
    image: postgres:17-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: doujins_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Install pgvector at container startup (dev-only) then launch postgres.
    # This avoids a custom Dockerfile.
    user: root
    command:
      - bash
      - -lc
      - |
        set -euo pipefail
        if [ ! -f /usr/lib/postgresql/17/lib/vector.so ]; then
          apt-get update
          apt-get install -y --no-install-recommends postgresql-17-pgvector
          rm -rf /var/lib/apt/lists/*
        fi
        export PATH="/usr/lib/postgresql/17/bin:$PATH"
        exec /usr/local/bin/docker-entrypoint.sh postgres \
          -c listen_addresses='*' \
          -c log_min_messages=warning \
          -c client_min_messages=warning \
          -c log_error_verbosity=terse \
          -c log_connections=off \
          -c log_disconnections=off \
          -c log_statement=none \
          -c log_min_error_statement=error \
          -c log_min_duration_statement=-1
    networks:
      - local-doujins
    healthcheck:
      # Wait until the main DB (app) is reachable on the TCP port.
      test:
        [
          "CMD",
          "pg_isready",
          "-U",
          "admin",
          "-d",
          "doujins_db",
          "-h",
          "localhost",
        ]
      interval: 5s
      timeout: 5s
      start_period: 90s
      retries: 1
  
  garnet:
    image: ghcr.io/microsoft/garnet:latest
    volumes:
      - garnet_data:/data
    ports:
      - "6382:6379"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "timeout 1 bash -c 'exec 3<>/dev/tcp/localhost/6379' 2>/dev/null",
        ]
      interval: 2s
      timeout: 5s
      retries: 5
    networks:
      - local-doujins

  # ClickHouse for analytics
  clickhouse:
    image: clickhouse/clickhouse-server:25.8-alpine
    restart: unless-stopped
    ports:
      - "8124:8123"  # HTTP interface
      - "9003:9000"  # Native client (avoid conflicts)
    volumes:
      - ./clickhouse/config.yaml:/etc/clickhouse-server/config.yaml:ro
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    environment:
      CLICKHOUSE_DB: analytics
      CLICKHOUSE_USER: analytics_user
      CLICKHOUSE_PASSWORD: analytics_password
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test: ["CMD", "clickhouse-client", "--user=analytics_user", "--password=analytics_password", "--query", "SELECT 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 120s
    networks:
      - local-doujins

  # Bootstrap DB: create roles/schema/extensions using superuser
  db-bootstrap:
    image: postgres:17-bookworm
    environment:
      PGPASSWORD: admin_password
    volumes:
      - ./migrations/bootstrap:/bootstrap:ro
    # Supply psql variables used by the SQL file
    command: [
      "psql",
      "-v", "ON_ERROR_STOP=1",
      "-v", "DOUJINS_PW=${DOUJINS_DB_PASSWORD:-doujins_password}",
      "-v", "BILLING_PW=${BILLING_DB_PASSWORD:-billing_password}",
      "-h", "postgres",
      "-U", "admin",
      "-d", "doujins_db",
      "-f", "/bootstrap/000_baseline_roles.sql"
    ]
    restart: "no"
    networks:
      - local-doujins
    depends_on:
      postgres:
        condition: service_healthy


  # App migrations: run embedded migrator in the billing image
  billing-migrate:
    build:
      context: .
      dockerfile: Dockerfile
      secrets:
        - gh_token
    depends_on:
      postgres:
        condition: service_healthy
      db-bootstrap:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
    environment:
      # Database connection (using billing_app service role after bootstrap)
      DATABASE_URL: "postgres://admin:${POSTGRES_PASSWORD:-admin_password}@postgres:5432/doujins_db?sslmode=disable"
      DB_SCHEMA: "billing"
      PGOPTIONS: -c search_path=$${DB_SCHEMA:-billing},public
      # ClickHouse connection for migrations
      CLICKHOUSE_HTTP_ADDR: "http://clickhouse:8123"
      CLICKHOUSE_CLIENT_ADDR: "clickhouse:9000"
      CLICKHOUSE_DATABASE: "analytics"
      CLICKHOUSE_USERNAME: "${CLICKHOUSE_USERNAME:-analytics_user}"
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD:-analytics_password}"
    command: ["migrate", "up"]
    restart: "no"
    networks:
      - local-doujins

  # Billing service (server + in-process workers)
  billing:
    build:
      context: .
      dockerfile: Dockerfile
      secrets:
        - gh_token
    # Avoid infinite restart loops if the app panics at startup
    restart: on-failure:3
    depends_on:
      postgres:
        condition: service_healthy
      db-bootstrap:
        condition: service_completed_successfully
      billing-migrate:
        condition: service_completed_successfully
      garnet:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    ports:
      - "2053:2053"  # Public API
    expose:
      - "8060"       # Private API (internal-only)
    environment:
      # Database connection (using billing_app service role)
      DATABASE_URL: "postgres://admin:${POSTGRES_PASSWORD:-admin_password}@postgres:5432/doujins_db?sslmode=disable"
      DB_SCHEMA: "billing"
      PGOPTIONS: -c search_path=$${DB_SCHEMA:-billing},public
      # Redis connection
      REDIS_ADDR: "garnet:6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      # ClickHouse connection for analytics
      CLICKHOUSE_HTTP_ADDR: "http://clickhouse:8123"
      CLICKHOUSE_CLIENT_ADDR: "clickhouse:9000"
      CLICKHOUSE_DATABASE: "analytics"
      CLICKHOUSE_USERNAME: "${CLICKHOUSE_USERNAME:-analytics_user}"
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD:-analytics_password}"
    command: ["server"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2053/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - billing_spool:/var/lib/doujins-billing/spool
    networks:
      - local-doujins

volumes:
  postgres_data:
  garnet_data:
  go_mod_cache:
    external: true
    name: go_mod_cache_persistent
  clickhouse_data:
  clickhouse_logs:
  billing_spool:

networks:
  local-doujins:
    name: local-doujins

secrets:
  gh_token:
    file: .secrets/gh_token
