version: "3"

vars:
  BINARY_NAME: billing
  BIN_DIR: bin
  GIT_COMMIT:
    sh: git rev-parse HEAD
  GIT_TAG:
    sh: git describe --tags --always --dirty
  LDFLAGS: '-X main.Version={{.GIT_TAG}} -X main.Commit={{.GIT_COMMIT}}'

tasks:
  default:
    cmds:
      - task -l

  build:
    desc: Build the binary locally
    cmds:
      - echo "Building {{.BINARY_NAME}}..."
      - mkdir -p {{.BIN_DIR}}
      - go build -ldflags "{{.LDFLAGS}}" -o {{.BIN_DIR}}/{{.BINARY_NAME}} ./

  run:
    desc: Build and run the application server
    deps: [build]
    cmds:
      - echo "Running {{.BINARY_NAME}}..."
      - ./{{.BIN_DIR}}/{{.BINARY_NAME}} server

  dev:
    desc: Run the application in development mode with hot reload
    cmds:
      - echo "Running in development mode with Air..."
      - air -c .air.toml

  docker-up:
    desc: Start local docker compose stack (openrails + deps)
    cmds:
      - docker compose -f docker-compose.yaml --profile all up -d

  docker-up-e2e-sandbox:
    desc: Start local stack + AuthKit issuer (for sandbox/E2E JWT minting)
    cmds:
      - docker compose -f docker-compose.yaml --profile all --profile e2e-sandbox up -d

  docker-down:
    desc: Stop local docker compose stack
    cmds:
      - docker compose -f docker-compose.yaml down

  docker-logs:
    desc: Tail openrails logs from docker compose stack
    cmds:
      - docker compose -f docker-compose.yaml logs -f openrails

  tunnel-webhooks:
    desc: Run cloudflared tunnel for deterministic webhook hostname (requires CLOUDFLARED_TUNNEL_TOKEN)
    cmds:
      - bash scripts/webhook_tunnel.sh

  verify-webhook-tunnel:
    desc: Verify Cloudflared routing reaches local openrails (/health/live + /health/ready)
    cmds:
      - bash scripts/verify_webhook_tunnel.sh

  mint-jwt:
    desc: Mint a JWT from local AuthKit devserver (requires docker-up-e2e-sandbox + AUTHKIT_DEV_MINT_SECRET)
    cmds:
      - bash scripts/mint_jwt.sh

  seed-e2e-mobius:
    desc: Seed a minimal Mobius/NMI catalog (1 product + 1 price w/ plan_id) into local Postgres
    cmds:
      - bash scripts/seed_e2e_mobius.sh

  e2e-dump-local:
    desc: Dump local rows for current E2E_RUN_ID/E2E_USER_ID
    cmds:
      - bash scripts/e2e_dump_local.sh

  nmi-query:
    desc: Call NMI Query API (requires PROCESSORS_MOBIUS_SECURITY_KEY + optionally PROCESSORS_MOBIUS_QUERY_URL)
    cmds:
      - bash scripts/nmi_query.sh {{if .TXN_ID}}--transaction-id "{{.TXN_ID}}"{{end}} {{if .SUB_ID}}--subscription-id "{{.SUB_ID}}"{{end}}

  e2e-mobius-sandbox:
    desc: Start compose + start cloudflared + send signed test webhook (requires cloudflared + env vars)
    cmds:
      - bash scripts/mobius_sandbox_e2e.sh

  test:
    desc: Run tests
    cmds:
      - echo "Running tests..."
      - go test -v -race ./...
      - echo "Running integration tests..."
      - go test -v -tags=integration ./...

  fmt:
    desc: Format code
    cmds:
      - echo "Formatting code..."
      - go fmt ./...
      - goimports -w .

  clean:
    desc: Clean build artifacts
    cmds:
      - echo "Cleaning..."
      - rm -f {{.BIN_DIR}}/{{.BINARY_NAME}}
      - rmdir {{.BIN_DIR}} 2>/dev/null || true
      - rm -f coverage.out coverage.html
      - go clean -cache
